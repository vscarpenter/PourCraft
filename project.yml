name: PourCraft
options:
  bundleIdPrefix: com.pourcraft
  deploymentTarget:
    iOS: "17.0"
  xcodeVersion: "16.0"

settings:
  base:
    SWIFT_VERSION: "5.9"

targets:
  PourCraft:
    type: application
    platform: iOS
    sources:
      - path: PourCraft
    settings:
      base:
        INFOPLIST_FILE: PourCraft/Info.plist
        PRODUCT_BUNDLE_IDENTIFIER: com.pourcraft.app
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        SWIFT_EMIT_LOC_STRINGS: "YES"
    info:
      path: PourCraft/Info.plist
      properties:
        UILaunchScreen:
          UIImageName: LaunchIcon
          UIColorName: LaunchBackground
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
        UISupportedInterfaceOrientations~ipad:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationPortraitUpsideDown
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight

  PourCraftTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: PourCraftTests
    dependencies:
      - target: PourCraft
    settings:
      base:
        GENERATE_INFOPLIST_FILE: true
        PRODUCT_BUNDLE_IDENTIFIER: com.pourcraft.tests
        TEST_HOST: "$(BUILT_PRODUCTS_DIR)/PourCraft.app/$(BUNDLE_EXECUTABLE_FOLDER_PATH)/PourCraft"
        BUNDLE_LOADER: "$(TEST_HOST)"

schemes:
  PourCraft:
    build:
      targets:
        PourCraft: all
        PourCraftTests: [test]
    test:
      targets:
        - PourCraftTests
